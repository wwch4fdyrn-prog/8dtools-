<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8D Creator</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;

      /* großes Logo im Hintergrund */
      background-image: url('logo.png'); /* Pfad bei Bedarf anpassen */
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 80vmin;   /* Größe des Logos */
      background-attachment: scroll; /* oder fixed */

      /* Fallback-Hintergrundfarbe */
      background-color: #08142a;
      color: #ffffff;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 40px 20px;
      background-color: #0f1d3a;
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo-box small a {
      color: #aaccff;
    }

    h1 {
      margin: 10px 0 0 0;
      font-size: 22px;
    }

    .controls,
    .config-panel {
      margin-top: 20px;
      padding: 12px;
      background-color: #15254a;
      border-radius: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      align-items: flex-end;
    }

    .controls > div,
    .config-panel > div {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
    }

    label {
      font-size: 13px;
      margin-top: 8px;
      display: block;
    }

    select,
    input[type="text"],
    input[type="email"],
    input[type="url"],
    button,
    textarea {
      padding: 5px 8px;
      font-size: 13px;
      border-radius: 3px;
      border: 1px solid #445;
      background-color: #132347;
      color: #ffffff;
      box-sizing: border-box;
    }

    textarea {
      width: 100%;
      min-height: 60px;
      resize: vertical;
      font-family: Arial, sans-serif;
    }

    button {
      cursor: pointer;
      background-color: #1f3a7a;
      border-color: #567;
    }

    button:hover {
      background-color: #28448a;
    }

    .main {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-box {
      padding: 12px;
      background-color: #15254a;
      border-radius: 6px;
      font-size: 14px;
    }

    .ampel-rot  { color: #ff6f6f;  font-weight: bold; }
    .ampel-gelb { color: #ffd54f;  font-weight: bold; }
    .ampel-gruen{ color: #80e27e;  font-weight: bold; }

    .help-icon {
      display: inline-block;
      margin-left: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background-color: #1f3a7a;
      color: #fff;
      font-size: 11px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
    }

    .help-icon:hover {
      background-color: #28448a;
    }

    #helpBubble {
      font-size: 13px;
      border-left: 3px solid #4fc3f7;
    }

    #helpBubbleHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    #helpBubbleHeader button {
      padding: 2px 6px;
      font-size: 11px;
    }

    .dblock {
      margin-top: 16px;
      padding: 12px;
      background-color: #15254a;
      border-radius: 6px;
    }

    .dblock h2 {
      margin-top: 0;
      font-size: 16px;
    }

    input[type="file"] { display: none; }

    .text-ok {
      border: 2px solid #4caf50;
      box-shadow: 0 0 4px #4caf50;
    }

    .text-warn {
      border: 2px solid #ffc107;
      box-shadow: 0 0 4px #ffc107;
      background-color: rgba(255, 193, 7, 0.06);
    }

    .text-error {
      border: 2px solid #f44336;
      box-shadow: 0 0 4px #f44336;
      background-color: rgba(244, 67, 54, 0.06);
    }

    @media print {
      body { background-color: #ffffff; color: #000000; }
      .page { background-color: #ffffff; padding: 10px; max-width: 100%; }
      .no-print { display: none !important; }
      .header {
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .logo-box img { max-height: 40px; }
      h1 { color: #000; font-size: 18px; }
      .dblock {
        background-color: #ffffff;
        border: 1px solid #ccc;
        page-break-inside: avoid;
        margin-top: 10px;
        padding: 10px;
      }
      .dblock h2 {
        color: #000;
        border-bottom: 1px solid #999;
        padding-bottom: 4px;
      }
      textarea, select, input {
        border: 1px solid #999;
        background-color: #fff;
        color: #000;
      }
      select { display: none; }
      .result-box {
        background-color: #f5f5f5;
        border: 1px solid #999;
        page-break-inside: avoid;
      }
      .ampel-rot { color: #c00; }
      .ampel-gelb { color: #c80; }
      .ampel-gruen { color: #080; }
    }
  </style>
</head>

</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1 id="titleMain">8D Creator</h1>
        <p style="font-size:13px;margin-top:4px;">Thermomanagement / Automotive / Supplier 8D</p>
      </div>
      <div class="logo-box" id="customerLogoBox"></div>
    </div>

    <div class="config-panel no-print">
      <div>
        <label for="customerName">Kundenname / Customer name <span class="help-icon" data-help-key="customerName">?</span></label>
        <input type="text" id="customerName" placeholder="z.B. Premium‑OEM X">
      </div>
      <div>
        <label for="customerLogoUrl">Logo‑URL <span class="help-icon" data-help-key="customerLogoUrl">?</span></label>
        <input type="url" id="customerLogoUrl" placeholder="https://.../logo.png">
      </div>
      <div>
        <label for="customerWebUrl">Webadresse / Website <span class="help-icon" data-help-key="customerWebUrl">?</span></label>
        <input type="url" id="customerWebUrl" placeholder="https://www.kunde.de">
      </div>
      <div>
        <label for="customerEmail">Kontakt‑E‑Mail / Contact email <span class="help-icon" data-help-key="customerEmail">?</span></label>
        <input type="email" id="customerEmail" placeholder="quality@kunde.de">
      </div>
      <div>
        <label for="severity">Schweregrad / Severity <span class="help-icon" data-help-key="severity">?</span></label>
        <select id="severity">
          <option value="">– wählen –</option>
          <option value="S1">S1 – gering (kein Kunde betroffen)</option>
          <option value="S2">S2 – mittel (Kunde betroffen, keine Sicherheit)</option>
          <option value="S3">S3 – hoch (Linienstillstand / Feld)</option>
          <option value="S4">S4 – kritisch (Sicherheit / Gesetz)</option>
        </select>
      </div>
      <div>
        <label>&nbsp;</label>
        <button type="button" onclick="saveCustomerConfig()">Kunden‑Konfiguration speichern</button>
      </div>
    </div>

    <div class="controls no-print">
      <div>
        <label for="language">Sprache / Language <span class="help-icon" data-help-key="language">?</span></label>
        <select id="language" name="language" onchange="applyLanguage()">
          <option value="de">Deutsch</option>
          <option value="en">English</option>
        </select>
      </div>
      <div>
        <label for="fertigungstechnik">Fertigungstechnik / Manufacturing <span class="help-icon" data-help-key="fertigungstechnik">?</span></label>
        <select id="fertigungstechnik" name="fertigungstechnik">
          <option value="">– bitte wählen / please select –</option>
          <option value="giessen">Gießen</option>
          <option value="zerspanen">Zerspanen</option>
          <option value="schmieden">Schmieden</option>
          <option value="tm_kuehlleitungen">Thermomanagement – Kühlleitungen</option>
          <option value="tm_leitungssysteme_hv">Thermomanagement – Leitungssysteme HV‑Batterie</option>
          <option value="kunststoffspritzguss">Kunststoffspritzguss</option>
          <option value="aludruckguss">Alu‑Druckguss</option>
        </select>
      </div>
      <div>
        <label for="level">Level <span class="help-icon" data-help-key="level">?</span></label>
        <select id="level" name="level">
          <option value="entry">Entry</option>
          <option value="advanced">Advanced</option>
          <option value="automotive">Automotive</option>
        </select>
      </div>
      <div><label>&nbsp;</label><button type="button" onclick="checkCurrentDocument()">Q‑Checker aktuelles Dokument</button></div>
      <div><label>&nbsp;</label><button type="button" onclick="saveDraft()">Entwurf lokal speichern</button></div>
      <div><label>&nbsp;</label><button type="button" onclick="loadDraft()">Entwurf laden</button></div>
      <div><label>&nbsp;</label><button type="button" onclick="exportReport()">8D als JSON exportieren</button></div>
      <div>
        <label>&nbsp;</label>
        <input type="file" id="importFile" accept=".json" onchange="handleImportFile(this)">
        <button type="button" onclick="document.getElementById('importFile').click()">8D-JSON importieren</button>
      </div>
      <div><label>&nbsp;</label><button type="button" onclick="window.print()">📄 Drucken / PDF</button></div>
    </div>

    <div class="dblock">
      <h2>D2 – Problembeschreibung</h2>
      <label for="d2_select" class="no-print">Problembeschreibung aus Vorschlag wählen:</label>
      <select id="d2_select" onchange="insertHintIntoField('d2_select','d2_text')" class="no-print"><option value="">– Vorschlag auswählen –</option></select>
      <label for="d2_text">Strukturierte Problembeschreibung (Wer/Was/Wo/Wann/Wie viel):</label>
      <textarea id="d2_text" placeholder="Beschreibe das Problem mit 5W2H / IS-IS-NOT möglichst konkret..."></textarea>
    </div>

    <div class="dblock">
      <h2>D3 – Eindämmmaßnahmen (Containment)</h2>
      <label for="d3_select" class="no-print">Eindämmmaßnahme aus Vorschlag wählen:</label>
      <select id="d3_select" onchange="insertHintIntoField('d3_select','d3_text')" class="no-print"><option value="">– Vorschlag auswählen –</option></select>
      <label for="d3_text">Eindämmmaßnahmen / Interim Containment Actions:</label>
      <textarea id="d3_text" placeholder="Welche Sofortmaßnahmen verhindern weitere fehlerhafte Teile beim Kunden?..."></textarea>
    </div>

    <div class="dblock">
      <h2>D4 – Ursache (Occurrence)</h2>
      <label for="d4_select" class="no-print">Thema / Ursache aus Vorschlag wählen:</label>
      <select id="d4_select" onchange="insertHintIntoField('d4_select','d4_text')" class="no-print"><option value="">– Vorschlag auswählen –</option></select>
      <label for="d4_text">Beschreibung technische Root Cause:</label>
      <textarea id="d4_text" placeholder="Beschreibe die technische Ursache (Occurrence) möglichst konkret..."></textarea>
    </div>

    <div class="dblock">
      <h2>D5 – Abstellmaßnahmen</h2>
      <label for="d5_select" class="no-print">Maßnahmen aus Vorschlag wählen:</label>
      <select id="d5_select" onchange="insertHintIntoField('d5_select','d5_text')" class="no-print"><option value="">– Vorschlag auswählen –</option></select>
      <label for="d5_text">Maßnahmen zur Beseitigung der Ursache:</label>
      <textarea id="d5_text" placeholder="Konkrete Maßnahmen aus der verifizierten Ursache ableiten..."></textarea>
    </div>

    <div class="dblock">
      <h2>D6 – Wirksamkeitsnachweis</h2>
      <label for="d6_select" class="no-print">Nachweis aus Vorschlag wählen:</label>
      <select id="d6_select" onchange="insertHintIntoField('d6_select','d6_text')" class="no-print"><option value="">– Vorschlag auswählen –</option></select>
      <label for="d6_text">Wirksamkeit / Daten / Beobachtungszeitraum:</label>
      <textarea id="d6_text" placeholder="Welche Daten / Zeiträume zeigen, dass der Fehler nicht mehr auftritt?..."></textarea>
    </div>

    <div class="dblock">
      <h2>D7 – Wiederholvermeidung</h2>
      <label for="d7_select" class="no-print">Systemmaßnahmen aus Vorschlag wählen:</label>
      <select id="d7_select" onchange="insertHintIntoField('d7_select','d7_text')" class="no-print"><option value="">– Vorschlag auswählen –</option></select>
      <label for="d7_text">Systemmaßnahmen / Dokumente / Schulungen:</label>
      <textarea id="d7_text" placeholder="Welche Systemmaßnahmen verhindern eine Wiederholung (Dokumente, FMEA, Schulungen)?..."></textarea>
    </div>

    <div class="main">
      <div class="result-box" id="resultSummary"></div>
      <div class="result-box no-print" id="helpBubble" style="display:none;"></div>
    </div>
  </div>

  <script>
    const DRAFT_KEY = 'qchecker_8d_draft';

    function makeThermoProfile(title) {
      return {
        d2: [
          `Leckage, Maßabweichung oder Funktionsfehler an ${title} gemeldet.`,
          `Betroffene Teile zeigen Abweichung an Dichtfläche, Bördelung, Crimp oder Verbindung.`,
          `Fehler tritt in Serienproduktion oder beim Kunden unter realer Belastung auf.`,
          `Problem betrifft bestimmte Chargen, Maschinen, Werkzeuge oder Montageschichten.`,
          `Ausfall zeigt sich unter Druck-, Temperatur- oder Vibrationseinfluss.`,
          `Es existieren betroffene Teile aus Lager, Versand oder Feld.`,
          `Fehlerbild ist reproduzierbar über Prüfstand, Sichtprüfung oder Dichtheitsprüfung.`,
          `Bereits durchgeführte Sortierung brachte keine nachhaltige Lösung.`,
          `Bauteile sind auf Rohr, Anschluss, Dichtung und Montageparameter rückverfolgbar.`,
          `Auswirkung: Funktionsverlust, Leckage, Reklamation oder Feldrisiko.`,
          `Ähnliche Fehlerbilder wurden bereits in früheren Projekten beobachtet.`,
          `Fehler tritt nur bei bestimmten Varianten oder Montagekonfigurationen auf.`,
          `Veränderung der Fehlerquote nach Prozessparameteränderung erkennbar.`,
          `Problem zeigt Bezug zu Montage, Werkstoff, Dichtung oder Fügestelle.`,
          `Sicherheits- oder gesetzesrelevant, wenn Medium austritt oder Funktion ausfällt.`
        ],
        d3: [
          `Sofortige Sperrung und Kennzeichnung aller Bestände im eigenen Werk.`,
          `Sperrung aller Lagerbestände, Zwischenlager und Versandpositionen.`,
          `Kundeninformation mit Beschreibung des Risikos und der Sofortmaßnahmen.`,
          `100%-Kontrolle von Dichtheit, Montagezustand und sichtbaren Fehlern.`,
          `Quarantäne bereits ausgelieferter Teile, soweit organisatorisch möglich.`,
          `Tägliche Statusmeldung an Kunde und interne Eskalation.`,
          `Sortieraktion an kritischen Losen / Chargen / Schichten.`,
          `Freigabe nur nach dokumentierter Zusatzprüfung.`,
          `Temporäre Verschärfung des Prüfplans an kritischen Merkmalen.`,
          `Zwischenprüfung von Werkzeug, Dichtung und Montageprozess.`,
          `Temporäre Umstellung auf geprüfte Alternativquelle/Prozess, sofern verfügbar.`,

          `Werkstoff- oder Rohrchargen schwanken in Härte / Maßhaltigkeit`,
          `Partikel oder Verschmutzung im System beeinträchtigt die Dichtheit`,
          `Werkzeugverschleiß an Bördel-, Crimp- oder Schweißvorrichtung`,

          `Leitungsführung erzeugt Scheuerstelle, Ermüdung oder Kontaktfehler`,
          `Schweißparameter nicht stabil oder nicht dokumentiert`,
          `Rückverfolgbarkeit von Rohr, Dichtung, Werkzeug und Parameter unvollständig`,
          `Fehlende Freigabe von Prozess-/Produktänderung im Thermomanagementprozess`
        ],
        d5: [
          `Crimp-/Bördelparameter festlegen, sperren und mittels Erstteilfreigabe absichern`,
          `Dichtfläche reinigen, schützen und visuell sowie messtechnisch freigeben`,
          `Schweißparameter, Nahtvorbereitung und Nahtprüfung verbindlich definieren`,
          `Mindestbiegeradius und Leitungsführung standardisieren, Scheuerschutz ergänzen`,
          `Montagefolge und Verrastung mit Poka-Yoke oder Lehren absichern`,
          `Drehmoment, Presskraft oder Montagekraft im Prozessfenster überwachen`,
          `Werkzeugverschleißgrenzen definieren und Wartungsintervall verkürzen`,
          `Materialfreigabe, Dichtungsfreigabe und Chargenkennzeichnung sicherstellen`,
          `Reinigungs- und Partikelmanagement im Prozess verbessern`,
          `Temperatur-/Druckwechsel in Validierung und Prüfumfang aufnehmen`,
          `Bördel-/Crimpwerkzeuge kalibrieren und Freigabestatus dokumentieren`,
          `Alternative Dicht- oder Verbindungslösung technisch bewerten und freigeben`,
          `Wartung und Reinigungsplan für Fügestelle und Vorrichtung einführen`,
          `Rückverfolgbarkeit von Parameter, Werkzeug, Charge und Montagepersonal sicherstellen`,
          `Prozessbeschreibung und Arbeitsanweisung mit kritischen Merkmalen aktualisieren`

        d6: [
          `Dichtheitsprüfung, Druckprüfung und Sichtprüfung zeigen stabile Erfüllung über definierten Zeitraum`,

          `Audit oder Layered Process Audit zeigt Einhaltung der neuen Vorgaben`,
          `Rückverfolgbarkeitsprüfung ist vollständig und nachvollziehbar`,

          `Weitere Losprüfung bestätigt stabile Prozessfenster`
        ],
        d7: [
          `FMEA für Dichtheit, Bördelung, Crimpung oder Schweißprozess aktualisieren`,
          `Control Plan, Prüfplan und Arbeitsanweisung mit den neuen Parametern ergänzen`,
          `Regelmäßige Schulung der Mitarbeitenden an Fügestelle und Montage einführen`,
          `Layered Process Audits für kritische Montage-/Fügeprozesse definieren`,
          `Änderungsmanagement für Werkstoff, Werkzeug und Parameter verbindlich machen`,
          `Lessons Learned in zentrale Wissensdatenbank übernehmen`,
          `Freigabeprozess für Werkzeuge, Dichtungen und Vorrichtungen standardisieren`,
          `Rückverfolgbarkeit auf Los-, Werkzeug- und Bedienerebene sicherstellen`,
          `Poka-Yoke-Elemente zur Vermeidung von Verwechslung oder Fehlmontage ergänzen`,
          `Kritische Prüfmerkmale im ERP/MES systematisch überwachen`,
          `Interne und externe Eskalationswege für Leckage-/Feldrisiken dokumentieren`,

          `Lessons Learned in APQP, DFMEA/PFMEA und Control Plan rückführen`

      };
    }

    const processLibrary = {
      giessen: makeThermoProfile('Gießen'),
      zerspanen: makeThermoProfile('Zerspanen'),
      schmieden: makeThermoProfile('Schmieden'),
      kunststoffspritzguss: makeThermoProfile('Kunststoffspritzguss'),
      aludruckguss: makeThermoProfile('Alu-Druckguss'),
      tm_kuehlleitungen: makeThermoProfile('Thermomanagement – Kühlleitungen'),
      tm_leitungssysteme_hv: makeThermoProfile('Thermomanagement – Leitungssysteme HV-Batterie')
    };

    const i18n = {
      de: {
        summaryHeadline: 'Ergebniszusammenfassung aktuelles Dokument',
        summaryCustomer: 'Kunde:',
        summaryProcess: 'Fertigungstechnik:',
        summaryLevel: 'Level:',
        summarySeverity: 'Schweregrad:',
        summaryAmpel: 'Gesamtbewertung:',
        evalCritical: 'kritisch – wesentliche Anforderungen sind nicht erfüllt; 8D-Report ist in dieser Form nicht freigabefähig.',
        evalBorderline: 'grenzwertig – wichtige Anforderungen sind nur teilweise erfüllt; 8D-Report sollte überarbeitet und ergänzt werden.',
        evalPlausible: 'plausibel – wesentliche Anforderungen sind weitgehend erfüllt; 8D-Report ist grundsätzlich akzeptabel.',
        evalNotAssessed: 'nicht bewertet – es liegen keine auswertbaren Informationen vor.',
        colorRedText: '<span class="ampel-rot">Rot</span>',
        colorYellowText: '<span class="ampel-gelb">Gelb</span>',
        colorGreenText: '<span class="ampel-gruen">Grün</span>'
      },f
      en: {
        summaryHeadline: 'Result summary current document',
        summaryCustomer: 'Customer:',
        summaryProcess: 'Manufacturing process:',
        summaryLevel: 'Level:',
        summarySeverity: 'Severity:',
        summaryAmpel: 'Overall rating:',
        evalCritical: 'critical – major requirements are not fulfilled; the 8D report is not releasable in its current form.',
        evalBorderline: 'borderline – important requirements are only partially fulfilled; the 8D report should be revised and completed.',
        evalPlausible: 'plausible – major requirements are largely fulfilled; the 8D report is basically acceptable.',
        evalNotAssessed: 'not assessed – no assessable information is available.',
        colorRedText: '<span class="ampel-rot">Red</span>',
        colorYellowText: '<span class="ampel-gelb">Yellow</span>',
        colorGreenText: '<span class="ampel-gruen">Green</span>'
      }
    };

    const helpTexts = {
      de: {
        customerName: 'Name des OEM oder Tier‑1 Kunden, für den der 8D‑Report erstellt wird.',
        customerLogoUrl: 'Direkte URL zum Kundenlogo.',
        customerWebUrl: 'Offizielle Website des Kunden.',
        customerEmail: 'Standard‑Kontaktadresse für 8D‑Berichte.',
        language: 'Steuert die Anzeige der UI‑Texte (DE/EN).',
        fertigungstechnik: 'Wähle die passende Fertigungstechnik des reklamierten Bauteils.',
        level: 'Entry: Basischecks; Advanced: strengere Plausibilität; Automotive: OEM/VDA-Standard mit höchster Strenge.',
        severity: 'Schweregrad der Auswirkung beim Kunden: von internem Problem (S1) bis sicherheits-/gesetzkritisch (S4).'
      },
      en: {
        customerName: 'Name of the OEM or Tier‑1 customer for whom the 8D report is created.',
        customerLogoUrl: 'Direct URL to the customer logo.',
        customerWebUrl: 'Official customer website.',
        customerEmail: 'Standard contact address for 8D reports.',
        language: 'Controls the UI language (DE/EN).',
        fertigungstechnik: 'Select the manufacturing process of the rejected part.',
        level: 'Entry: basic checks; Advanced: stricter plausibility; Automotive: OEM/VDA standard with highest strictness.',
        severity: 'Severity of customer impact: from internal issue (S1) to safety/legally critical (S4).'
      }
    };

    function getLang() { return document.getElementById('language')?.value || 'de'; }

    function applyLanguage() {
      document.title = '8D Creator';
      const titleMain = document.getElementById('titleMain');
      if (titleMain) titleMain.textContent = '8D Creator';
      renderSummary(null);
    }

    function saveCustomerConfig() {
      const cfg = {
        name: document.getElementById('customerName').value.trim(),
        logo: document.getElementById('customerLogoUrl').value.trim(),
        web: document.getElementById('customerWebUrl').value.trim(),
        email: document.getElementById('customerEmail').value.trim()
      };
      try { localStorage.setItem('qchecker_customer', JSON.stringify(cfg)); } catch (e) {}
      applyCustomerConfig();
    }

    function applyCustomerConfig() {
      let cfg = null;
      try {
        const raw = localStorage.getItem('qchecker_customer');
        if (raw) cfg = JSON.parse(raw);
      } catch (e) {}
      const box = document.getElementById('customerLogoBox');
      if (!box) return;
      box.innerHTML = '';
      if (cfg && (cfg.logo || cfg.name)) {
        const wrapper = document.createElement('div');
        if (cfg.logo) {
          const img = document.createElement('img');
          img.src = cfg.logo;
          img.alt = cfg.name || 'Customer logo';
          wrapper.appendChild(img);
        }
        if (cfg.web || cfg.email || cfg.name) {
          const info = document.createElement('small');
          const lines = [];
          if (cfg.name) lines.push(cfg.name);
          if (cfg.web) lines.push(`<a href="${cfg.web}" target="_blank" rel="noopener noreferrer">${cfg.web}</a>`);
          if (cfg.email) lines.push(cfg.email);
          info.innerHTML = lines.join('<br>');
          wrapper.appendChild(info);
        }
        box.appendChild(wrapper);
        document.getElementById('customerName').value = cfg.name || '';
        document.getElementById('customerLogoUrl').value = cfg.logo || '';
        document.getElementById('customerWebUrl').value = cfg.web || '';
        document.getElementById('customerEmail').value = cfg.email || '';
      }
    }

    function getColoredAmpelText(ampel) {
      const t = i18n[getLang()] || i18n.de;
      if (ampel === 'Rot') return t.colorRedText;
      if (ampel === 'Gelb') return t.colorYellowText;
      if (ampel === 'Grün') return t.colorGreenText;
      return '';
    }

    function getVerbaleBewertung(ampel) {
      const t = i18n[getLang()] || i18n.de;
      if (ampel === 'Rot') return t.evalCritical;
      if (ampel === 'Gelb') return t.evalBorderline;
      if (ampel === 'Grün') return t.evalPlausible;
      return t.evalNotAssessed;
    }

    function haveCommonKeyword(txt1, txt2) {
      const stop = ['der','die','das','und','oder','mit','auf','in','von','für','the','and','of','to','in'];
      const words1 = txt1.split(/[^a-zäöüß0-9]+/i).filter(w => w.length > 3 && !stop.includes(w.toLowerCase()));
      const words2 = txt2.split(/[^a-zäöüß0-9]+/i).filter(w => w.length > 3 && !stop.includes(w.toLowerCase()));
      return words1.some(w => words2.some(w2 => w2.toLowerCase() === w.toLowerCase()));
    }

    function setFieldStatus(textareaId, status, tooltipText) {
      const el = document.getElementById(textareaId);
      if (!el) return;
      el.classList.remove('text-ok', 'text-warn', 'text-error');
      if (tooltipText && tooltipText.length > 0) el.title = tooltipText;
      else el.removeAttribute('title');
      if (status === 'ok') el.classList.add('text-ok');
      if (status === 'warn') el.classList.add('text-warn');
      if (status === 'error') el.classList.add('text-error');
    }

    function getProcessTexts(ftKey) {
      return processLibrary[ftKey] || null;
    }

    function buildSeverityPack(severity) {
      if (severity === 'S4') {
        return {
          extraD3: ' Vollständige Quarantäne, 100%-Sortierung, Kundeninfo, Freigabe nur nach dokumentierter Zusatzprüfung.',
          extraD5: ' Prozessparameter freigeben und sperren, Grenzwerte definieren, Erstteilfreigabe absichern, Rückverfolgbarkeit im System verankern.',
          extraD6: ' Messdaten, Fähigkeitsnachweis, Auditbeobachtung, Beobachtungszeitraum und Null-Fehler-Nachweis dokumentieren.',
          extraD7: ' FMEA, Control Plan, Arbeitsanweisung, Schulung, LPA, Änderungsmanagement und Lessons Learned verbindlich aktualisieren.'
        };
      }
      if (severity === 'S3') {
        return {
          extraD3: ' Zusätzliche Prüfung, Sortieraktion, Kundenabstimmung und klare Freigaberegel.',
          extraD5: ' Technische Parameter und Prüfmerkmale verbindlich festlegen.',
          extraD6: ' Nachweis über Messdaten, Trend und stabilen Beobachtungszeitraum dokumentieren.',
          extraD7: ' Standards, Prüfplan, FMEA und Schulung anpassen.'
        };
      }
      if (severity === 'S2') {
        return {
          extraD3: ' Klare Zuordnung von Verantwortlichen und einfache Wirksamkeitsprüfung.',
          extraD5: ' Konkrete Ursache benennen und erste technische Gegenmaßnahme festlegen.',
          extraD6: ' Einfache Wirksamkeitsprüfung mit Daten oder Sichtprüfung angeben.',
          extraD7: ' Dokumente aktualisieren und Maßnahmen im Standard festhalten.'
        };
      }
      return { extraD3: '', extraD5: '', extraD6: '', extraD7: '' };
    }

    function checkCurrentDocument() {
      const level = document.getElementById('level').value || 'entry';
      const severity = document.getElementById('severity').value || '';
      const d4 = (document.getElementById('d4_text')?.value || '').trim();
      const d5 = (document.getElementById('d5_text')?.value || '').trim();
      const d6 = (document.getElementById('d6_text')?.value || '').trim();
      const d7 = (document.getElementById('d7_text')?.value || '').trim();

      const minLen = level === 'entry' ? 10 : 23;
      let status = 'Grün';
      const globalHints = [];
      const fieldStatus = { D4: { state: 'ok', errors: [] }, D5: { state: 'ok', errors: [] }, D6: { state: 'ok', errors: [] }, D7: { state: 'ok', errors: [] } };

      if (!severity) {
        status = 'Gelb';
        globalHints.push('IDX-00: Schweregrad/Severity ist nicht gewählt – bitte auswählen (S1–S4).');
      }

      [['D4', d4], ['D5', d5], ['D6', d6], ['D7', d7]].forEach(([name, txt]) => {
        if (txt.length > 0 && txt.length < minLen) {
          if (status !== 'Rot') status = 'Gelb';
          const msg = `IDX-LEN-${name}: ${name}: Text kürzer als ${minLen} Zeichen – bitte konkretisieren.`;
          fieldStatus[name].errors.push(msg);
          fieldStatus[name].state = 'warn';
          globalHints.push(msg);
        }
      });

      const highSeverity = (severity === 'S3' || severity === 'S4');
      if (level === 'automotive') {
        [['D5', d5], ['D6', d6], ['D7', d7]].forEach(([name, txt]) => {
          const low = txt.toLowerCase();
          if (low.includes('schulung') || low.includes('training')) {
            const lenLimit = highSeverity ? 120 : 80;
            if (txt.length < lenLimit) {
              status = 'Rot';
              const msg = `IDX-SCH-${name}: ${name}: „Schulung" alleine ist im Automotive‑Kontext${highSeverity ? ' und hohem Schweregrad ' : ' '}als Maßnahme No‑Go – bitte technische Maßnahmen und Nachweise ergänzen.`;
              fieldStatus[name].errors.push(msg);
              fieldStatus[name].state = 'error';
              globalHints.push(msg);
            }
          }
        });
      }

      if (d4.length >= 10) {
        [['D5', d5], ['D6', d6], ['D7', d7]].forEach(([name, txt]) => {
          if (!txt) return;
          if (!haveCommonKeyword(d4, txt)) {
            if (level === 'automotive') {
              if (highSeverity) status = 'Rot';
              else if (status !== 'Rot') status = 'Gelb';
              const msg = `IDX-REF-${name}: ${name}: Maßnahmen passen nicht erkennbar zur in D4 beschriebenen Ursache – bitte klaren Bezug zur Root Cause herstellen${highSeverity ? ' (bei hohem Schweregrad zwingend)' : ''}.`;
              fieldStatus[name].errors.push(msg);
              fieldStatus[name].state = highSeverity ? 'error' : 'warn';
              globalHints.push(msg);
            } else if (level === 'advanced') {
              if (status !== 'Rot') status = 'Gelb';
              const msg = `IDX-REF-${name}: ${name}: Bitte Bezug zu D4-Ursache deutlicher darstellen.`;
              fieldStatus[name].errors.push(msg);
              fieldStatus[name].state = 'warn';
              globalHints.push(msg);
            } else {
              const msg = `IDX-REF-${name}: ${name}: Prüfe, ob die Maßnahme klar zur D4-Ursache passt.`;
              fieldStatus[name].errors.push(msg);
              if (fieldStatus[name].state === 'ok') fieldStatus[name].state = 'warn';
              globalHints.push(msg);
            }
          }
        });
      }

      setFieldStatus('d4_text', fieldStatus.D4.state, fieldStatus.D4.errors.slice(0, 3).join('\n'));
      setFieldStatus('d5_text', fieldStatus.D5.state, fieldStatus.D5.errors.slice(0, 3).join('\n'));
      setFieldStatus('d6_text', fieldStatus.D6.state, fieldStatus.D6.errors.slice(0, 3).join('\n'));
      setFieldStatus('d7_text', fieldStatus.D7.state, fieldStatus.D7.errors.slice(0, 3).join('\n'));

      renderSummary(status);
      alert(globalHints.length ? 'Plausibilitätscheck aktuelles Dokument:\n\n' + globalHints.join('\n') : 'Plausibilitätscheck: Keine Beanstandungen gefunden.');
    }

    function renderSummary(ampel) {
      const t = i18n[getLang()] || i18n.de;
      const box = document.getElementById('resultSummary');
      if (!box) return;

      let cfg = null;
      try {
        const cfgRaw = localStorage.getItem('qchecker_customer');
        if (cfgRaw) cfg = JSON.parse(cfgRaw);
      } catch (e) {}

      const customerName = cfg && cfg.name ? cfg.name : '–';
      const fert = document.getElementById('fertigungstechnik').value || '–';
      const level = document.getElementById('level').value || 'entry';
      const severity = document.getElementById('severity').value || '–';

      const ampelHtml = ampel ? getColoredAmpelText(ampel) : '';
      const evalText = ampel ? getVerbaleBewertung(ampel) : t.evalNotAssessed;

      box.innerHTML = `
        <h2>${t.summaryHeadline}</h2>
        <p>
          ${t.summaryCustomer} ${customerName}<br>
          ${t.summaryProcess} ${fert}<br>
          ${t.summaryLevel} ${level}<br>
          ${t.summarySeverity} ${severity}<br>
          ${t.summaryAmpel} ${ampelHtml}
        </p>
        <p>${evalText}</p>
      `;
    }

    function showHelp(key) {
      const texts = helpTexts[getLang()] || helpTexts.de;
      const msg = texts[key] || '';
      const box = document.getElementById('helpBubble');
      if (!box) return;
      if (!msg) {
        box.style.display = 'none';
        return;
      }
      box.style.display = 'block';
      box.innerHTML = `
        <div id="helpBubbleHeader">
          <strong>Info / Help: ${key}</strong>
          <button type="button" onclick="hideHelp()">X</button>
        </div>
        <p>${msg}</p>
      `;
    }

    function hideHelp() {
      const box = document.getElementById('helpBubble');
      if (box) box.style.display = 'none';
    }

    function populatePullDownsForFt() {
      const ft = document.getElementById('fertigungstechnik').value;
      const severity = document.getElementById('severity').value || 'S1';
      const level = document.getElementById('level').value || 'entry';
      const cfg = getProcessTexts(ft);
      const map = { d2: 'd2_select', d3: 'd3_select', d4: 'd4_select', d5: 'd5_select', d6: 'd6_select', d7: 'd7_select' };

      let maxCount = 5;
      if (level === 'advanced') maxCount = 8;
      if (level === 'automotive') maxCount = 12;
      if (severity === 'S3') maxCount = Math.min(maxCount + 2, 15);
      if (severity === 'S4') maxCount = Math.min(maxCount + 4, 15);

      Object.keys(map).forEach(dKey => {
        const sel = document.getElementById(map[dKey]);
        if (!sel) return;
        sel.innerHTML = '<option value="">– Vorschlag auswählen –</option>';

        if (dKey === 'd3') {
          const d3Options = [
            'Sofortige Sperrung und Kennzeichnung aller Bestände.',
            '100%-Kontrolle der betroffenen Merkmale.',
            'Kundeninformation und Quarantäne.',
            'Sortieraktion und Freigabe nur nach dokumentierter Prüfung.',
            'Tägliches Reporting bis zur Freigabe der Abstellmaßnahmen.'
          ];
          const d3Count = severity === 'S4' ? 5 : severity === 'S3' ? 4 : severity === 'S2' ? 3 : 2;
          d3Options.slice(0, d3Count).forEach(text => {
            const opt = document.createElement('option');
            opt.value = text;
            opt.textContent = text;
            sel.appendChild(opt);
          });
        }

        if (!cfg) return;
        const texts = cfg[dKey];
        if (texts) {
          texts.slice(0, maxCount).forEach(text => {
            const opt = document.createElement('option');
            opt.value = text;
            opt.textContent = text;
            sel.appendChild(opt);
          });
        }
      });
    }

    function insertHintIntoField(selectId, textareaId) {
      const sel = document.getElementById(selectId);
      const ta = document.getElementById(textareaId);
      if (!sel || !ta) return;
      const val = sel.value;
      if (!val) return;
      if (ta.value && !ta.value.endsWith('\n')) ta.value += '\n';
      ta.value += val;
      sel.selectedIndex = 0;
    }

    function collectFormData() {
      return {
        customerName: document.getElementById('customerName').value,
        customerLogoUrl: document.getElementById('customerLogoUrl').value,
        customerWebUrl: document.getElementById('customerWebUrl').value,
        customerEmail: document.getElementById('customerEmail').value,
        severity: document.getElementById('severity').value,
        language: document.getElementById('language').value,
        fertigungstechnik: document.getElementById('fertigungstechnik').value,
        level: document.getElementById('level').value,
        d2_text: document.getElementById('d2_text').value,
        d3_text: document.getElementById('d3_text').value,
        d4_text: document.getElementById('d4_text').value,
        d5_text: document.getElementById('d5_text').value,
        d6_text: document.getElementById('d6_text').value,
        d7_text: document.getElementById('d7_text').value
      };
    }

    function applyFormData(data) {
      if (!data) return;
      const ids = [
        'customerName','customerLogoUrl','customerWebUrl','customerEmail',
        'severity','language','fertigungstechnik','level',
        'd2_text','d3_text','d4_text','d5_text','d6_text','d7_text'
      ];
      ids.forEach(id => {
        if (data[id] !== undefined && document.getElementById(id)) {
          document.getElementById(id).value = data[id];
        }
      });
      applyLanguage();
      applyCustomerConfig();
      populatePullDownsForFt();
      renderSummary(null);
    }

    function saveDraft() {
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(collectFormData()));
        alert('Entwurf gespeichert.');
      } catch (e) {
        alert('Speichern fehlgeschlagen: ' + e);
      }
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) {
          alert('Kein Entwurf vorhanden.');
          return;
        }
        applyFormData(JSON.parse(raw));
        alert('Entwurf geladen.');
      } catch (e) {
        alert('Laden fehlgeschlagen: ' + e);
      }
    }

    function exportReport() {
      const data = collectFormData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '8D_Report.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function handleImportFile(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          applyFormData(JSON.parse(e.target.result));
          alert('Import erfolgreich.');
        } catch (err) {
          alert('Ungültige JSON-Datei: ' + err);
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function init() {
      applyCustomerConfig();
      applyLanguage();
      populatePullDownsForFt();
      document.getElementById('fertigungstechnik').addEventListener('change', populatePullDownsForFt);
      document.getElementById('level').addEventListener('change', populatePullDownsForFt);
      document.getElementById('severity').addEventListener('change', populatePullDownsForFt);
      document.querySelectorAll('.help-icon').forEach(el => {
        el.addEventListener('click', () => showHelp(el.dataset.helpKey));
      });
      renderSummary(null);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
