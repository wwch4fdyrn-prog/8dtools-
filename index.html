<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8D Creator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #08142a;
      color: #ffffff;
      margin: 0;
      padding: 0;
      background-image: url('logo.png');
      background-repeat: no-repeat;
      background-position: top right;
      background-size: 120px auto;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 40px 20px;
      background-color: #0f1d3a;
      min-height: 100vh;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .logo-box img {
      max-height: 60px;
      max-width: 200px;
    }
    .logo-box small a {
      color: #aaccff;
    }
    h1 {
      margin: 10px 0 0 0;
      font-size: 22px;
    }
    .subtitle {
      font-size: 13px;
      margin-top: 4px;
      color: #aaccff;
    }
    .controls, .config-panel {
      margin-top: 20px;
      padding: 12px;
      background-color: #15254a;
      border-radius: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      align-items: flex-end;
    }
    .controls div,
    .config-panel div {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
    }
    label {
      font-size: 13px;
      margin-top: 8px;
      display: block;
    }
    select,
    input[type="text"],
    input[type="email"],
    input[type="url"],
    button,
    textarea {
      padding: 5px 8px;
      font-size: 13px;
      border-radius: 3px;
      border: 1px solid #445;
      background-color: #132347;
      color: #ffffff;
      box-sizing: border-box;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      font-family: Arial, sans-serif;
    }
    button {
      cursor: pointer;
      background-color: #1f3a7a;
      border-color: #567;
    }
    button:hover {
      background-color: #28448a;
    }
    .main {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .result-box {
      padding: 12px;
      background-color: #15254a;
      border-radius: 6px;
      font-size: 14px;
    }
    .ampel-rot { color: #ff6f6f; font-weight: bold; }
    .ampel-gelb { color: #ffd54f; font-weight: bold; }
    .ampel-gruen { color: #80e27e; font-weight: bold; }
    .help-icon {
      display: inline-block;
      margin-left: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background-color: #1f3a7a;
      color: #fff;
      font-size: 11px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
    }
    .help-icon:hover {
      background-color: #28448a;
    }
    #helpBubble {
      margin-top: 8px;
      padding: 8px;
      background-color: #132347;
      border-radius: 4px;
      border-left: 3px solid #4fc3f7;
      font-size: 13px;
      display: none;
    }
    #helpBubbleHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    #helpBubbleHeader button {
      padding: 2px 6px;
      font-size: 11px;
    }
    .dblock {
      margin-top: 16px;
      padding: 12px;
      background-color: #15254a;
      border-radius: 6px;
    }
    .dblock h2 {
      margin-top: 0;
      font-size: 16px;
    }
    input[type="file"] {
      display: none;
    }
    .text-ok {
      border: 2px solid #4caf50;
      box-shadow: 0 0 4px #4caf50;
    }
    .text-warn {
      border: 2px solid #ffc107;
      box-shadow: 0 0 4px #ffc107;
      background-color: rgba(255, 193, 7, 0.06);
    }
    .text-error {
      border: 2px solid #f44336;
      box-shadow: 0 0 4px #f44336;
      background-color: rgba(244, 67, 54, 0.06);
    }

    @media print {
      body {
        background-color: #ffffff;
        color: #000000;
        background-image: none;
      }
      .page {
        background-color: #ffffff;
        padding: 10px;
        max-width: 100%;
      }
      .no-print {
        display: none !important;
      }
      .header {
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .logo-box img {
        max-height: 40px;
      }
      h1 {
        color: #000;
        font-size: 18px;
      }
      .dblock {
        background-color: #ffffff;
        border: 1px solid #ccc;
        page-break-inside: avoid;
        margin-top: 10px;
        padding: 10px;
      }
      .dblock h2 {
        color: #000;
        border-bottom: 1px solid #999;
        padding-bottom: 4px;
      }
      textarea, select, input {
        border: 1px solid #999;
        background-color: #fff;
        color: #000;
      }
      select {
        display: none;
      }
      .result-box {
        background-color: #f5f5f5;
        border: 1px solid #999;
        page-break-inside: avoid;
      }
      .ampel-rot { color: #c00; }
      .ampel-gelb { color: #cc8800; }
      .ampel-gruen { color: #008800; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <h1 id="titleMain">8D Creator</h1>
      <p id="subtitle" class="subtitle">Branchenneutraler 8D-Report</p>
    </div>
    <div class="logo-box" id="customerLogoBox"></div>
  </div>

  <!-- Kundenkonfiguration -->
  <div class="config-panel no-print">
    <div>
      <label for="customerName" id="lblCustomerName">Kundenname</label>
      <input type="text" id="customerName" placeholder="z.B. PremiumOEM X">
    </div>
    <div>
      <label for="customerLogoUrl" id="lblCustomerLogoUrl">Logo-URL</label>
      <input type="url" id="customerLogoUrl" placeholder="https://...logo.png">
    </div>
    <div>
      <label for="customerWebUrl" id="lblCustomerWebUrl">Webadresse</label>
      <input type="url" id="customerWebUrl" placeholder="https://www.kunde.de">
    </div>
    <div>
      <label for="customerEmail" id="lblCustomerEmail">Kontakt-E-Mail</label>
      <input type="email" id="customerEmail" placeholder="quality@kunde.de">
    </div>
    <div>
      <label for="severity" id="lblSeverity">Schweregrad</label>
      <select id="severity">
        <option value="">– wählen –</option>
        <option value="S1">S1 – gering (kein Kunde betroffen)</option>
        <option value="S2">S2 – mittel (Kunde betroffen, keine Sicherheit)</option>
        <option value="S3">S3 – hoch (Linienstillstand / Feld)</option>
        <option value="S4">S4 – kritisch (Sicherheit / Gesetz)</option>
      </select>
    </div>
    <div>
      <label>&nbsp;</label>
      <button type="button" onclick="saveCustomerConfig()" id="btnSaveCustomerCfg">
        Kunden-Konfiguration speichern
      </button>
    </div>
  </div>

  <!-- Steuerleiste -->
  <div class="controls no-print">
    <div>
      <label for="language" id="lblLanguage">Sprache</label>
      <select id="language" name="language" onchange="applyLanguage()">
        <option value="de">Deutsch</option>
        <option value="en">English</option>
      </select>
    </div>
    <div>
      <label for="fertigungstechnik" id="lblFt">Fertigungstechnik / Manufacturing</label>
      <select id="fertigungstechnik" name="fertigungstechnik">
        <option value="">– bitte wählen / please select –</option>
        <option value="universal">Branchenneutral / Universal</option>
        <option value="giessen">Gießen / Casting</option>
        <option value="zerspanen">Zerspanen / Machining</option>
        <option value="schmieden">Schmieden / Forging</option>
        <option value="blechumformung">Blechumformung / Sheet metal forming</option>
        <option value="montage">Montage / Assembly</option>
        <option value="kunststoffspritzguss">Kunststoffspritzguss / Injection molding</option>
        <option value="elektronik">Elektronikfertigung / Electronics manufacturing</option>
        <option value="logistik">Logistik / Supply chain</option>
        <option value="dienstleistung">Dienstleistung / Service</option>
      </select>
    </div>
    <div>
      <label for="level" id="lblLevel">Level</label>
      <select id="level" name="level">
        <option value="entry">Entry</option>
        <option value="advanced">Advanced</option>
        <option value="automotive">Automotive</option>
      </select>
    </div>
    <div>
      <label>&nbsp;</label>
      <button type="button" onclick="checkCurrentDocument()" id="btnCheckDoc">
        Q-Checker aktuelles Dokument
      </button>
    </div>
    <div>
      <label>&nbsp;</label>
      <button type="button" onclick="saveDraft()" id="btnSaveDraft">
        Entwurf lokal speichern
      </button>
    </div>
    <div>
      <label>&nbsp;</label>
      <button type="button" onclick="loadDraft()" id="btnLoadDraft">
        Entwurf laden
      </button>
    </div>
    <div>
      <label>&nbsp;</label>
      <button type="button" onclick="exportReport()" id="btnExportJson">
        8D als JSON exportieren
      </button>
    </div>
    <div>
      <label>&nbsp;</label>
      <input type="file" id="importFile" accept=".json" onchange="handleImportFile(this)">
      <button type="button" onclick="document.getElementById('importFile').click()" id="btnImportJson">
        8D-JSON importieren
      </button>
    </div>
    <div>
      <label>&nbsp;</label>
      <button type="button" onclick="window.print()" id="btnPrint">
        📄 Drucken / PDF
      </button>
    </div>
  </div>

  <div class="main">
    <div class="result-box" id="resultSummary"></div>
    <div class="result-box no-print" id="helpBubble"></div>

    <!-- D2 -->
    <div class="dblock">
      <h2 id="d2title">D2 – Problembeschreibung</h2>
      <label for="d2select" id="lblD2select">
        Problembeschreibung aus Vorschlag wählen:
      </label>
      <select id="d2select" class="no-print" onchange="insertHintIntoField('d2select','d2text')">
        <option value="">– Vorschlag auswählen –</option>
      </select>
      <label for="d2text" id="lblD2text">
        Strukturierte Problembeschreibung (Wer/Was/Wo/Wann/Wie viel)
      </label>
      <textarea id="d2text"
        placeholder="Beschreibe das Problem mit 5W2H / IS–IS NOT so konkret wie möglich..."></textarea>
    </div>

    <!-- D3 -->
    <div class="dblock">
      <h2 id="d3title">D3 – Eindämmmaßnahmen (Containment)</h2>
      <label for="d3select" id="lblD3select">
        Eindämmmaßnahme aus Vorschlag wählen:
      </label>
      <select id="d3select" class="no-print" onchange="insertHintIntoField('d3select','d3text')">
        <option value="">– Vorschlag auswählen –</option>
      </select>
      <label for="d3text" id="lblD3text">
        Eindämmmaßnahmen / Interim Containment Actions
      </label>
      <textarea id="d3text"
        placeholder="Welche Sofortmaßnahmen verhindern weitere fehlerhafte Teile beim Kunden?..."></textarea>
    </div>

    <!-- D4 -->
    <div class="dblock">
      <h2 id="d4title">D4 – Ursache (Occurrence)</h2>
      <label for="d4select" id="lblD4select">
        Thema / Ursache aus Vorschlag wählen:
      </label>
      <select id="d4select" class="no-print" onchange="insertHintIntoField('d4select','d4text')">
        <option value="">– Vorschlag auswählen –</option>
      </select>
      <label for="d4text" id="lblD4text">
        Beschreibung technische Root Cause
      </label>
      <textarea id="d4text"
        placeholder="Beschreibe die technische Ursache (Occurrence) möglichst konkret..."></textarea>
    </div>

    <!-- D5 -->
    <div class="dblock">
      <h2 id="d5title">D5 – Abstellmaßnahmen</h2>
      <label for="d5select" id="lblD5select">
        Maßnahmen aus Vorschlag wählen:
      </label>
      <select id="d5select" class="no-print" onchange="insertHintIntoField('d5select','d5text')">
        <option value="">– Vorschlag auswählen –</option>
      </select>
      <label for="d5text" id="lblD5text">
        Maßnahmen zur Beseitigung der Ursache
      </label>
      <textarea id="d5text"
        placeholder="Konkrete Maßnahmen aus der verifizierten Ursache ableiten..."></textarea>
    </div>

    <!-- D6 -->
    <div class="dblock">
      <h2 id="d6title">D6 – Wirksamkeitsnachweis</h2>
      <label for="d6select" id="lblD6select">
        Nachweis aus Vorschlag wählen:
      </label>
      <select id="d6select" class="no-print" onchange="insertHintIntoField('d6select','d6text')">
        <option value="">– Vorschlag auswählen –</option>
      </select>
      <label for="d6text" id="lblD6text">
        Wirksamkeit / Daten / Beobachtungszeitraum
      </label>
      <textarea id="d6text"
        placeholder="Welche Daten und Zeiträume zeigen, dass der Fehler nicht mehr auftritt?..."></textarea>
    </div>

    <!-- D7 -->
    <div class="dblock">
      <h2 id="d7title">D7 – Wiederholvermeidung</h2>
      <label for="d7select" id="lblD7select">
        Systemmaßnahmen aus Vorschlag wählen:
      </label>
      <select id="d7select" class="no-print" onchange="insertHintIntoField('d7select','d7text')">
        <option value="">– Vorschlag auswählen –</option>
      </select>
      <label for="d7text" id="lblD7text">
        Systemmaßnahmen / Dokumente / Schulungen
      </label>
      <textarea id="d7text"
        placeholder="Welche Systemmaßnahmen verhindern eine Wiederholung (Dokumente, FMEA, Schulungen)?..."></textarea>
    </div>
  </div>
</div>

  function getLang() {
    return document.getElementById('language')?.value || 'de';
  }

  function makeGenericProfileUniversal() {
    return {
      d2: [
        "Maßabweichung an funktionskritischem Merkmal",

        "Abweichende Dokumentation (Stückliste, Zeichnung, Prüfplan)"

      d3: [
        "Sperrung aller Bestände in Produktion, Lager und Versand",
        "Sofortige Sperrung betroffener Chargen, Lose und Schichten",
        "100-%-Prüfung definierter kritischer Merkmale",
        "Sortieraktion nach klar definierten OK/NOK-Kriterien",
        "Zusatzprüfung vor Auslieferung mit dokumentierter Freigabe",

  function getVerbaleBewertung(ampel) {
    const t = i18n[getLang()] || i18n.de;
    if (ampel === 'Rot') return t.evalCritical;

    if (ampel === 'Grün') return t.evalPlausible;

  function haveCommonKeyword(txt1, txt2) {
    const stop = ["der","die","das","und","oder","mit","auf","in","von","für","the","and","of","to","in"];
    const words1 = txt1.split(/[^a-z0-9äöüß]+/i).filter(w => w.length > 3 && !stop.includes(w.toLowerCase()));
    const words2 = txt2.split(/[^a-z0-9äöüß]+/i).filter(w => w.length > 3 && !stop.includes(w.toLowerCase()));
    return words1.some(w => words2.some(w2 => w2.toLowerCase() === w.toLowerCase()));
  }

  function setFieldStatus(textareaId, status, tooltipText) {
    const el = document.getElementById(textareaId);
    if (!el) return;
    el.classList.remove("text-ok", "text-warn", "text-error");
    if (tooltipText && tooltipText.length > 0) {
      el.title = tooltipText;
    } else {
      el.removeAttribute("title");
    }
    if (status === "ok") el.classList.add("text-ok");
    if (status === "warn") el.classList.add("text-warn");
    if (status === "error") el.classList.add("text-error");
  }

  function checkCurrentDocument() {
    const level = document.getElementById("level").value || "entry";
    const severity = document.getElementById("severity").value || "";
    const d4 = (document.getElementById("d4text")?.value || "").trim();
    const d5 = (document.getElementById("d5text")?.value || "").trim();
    const d6 = (document.getElementById("d6text")?.value || "").trim();
    const d7 = (document.getElementById("d7text")?.value || "").trim();

    const minLen = level === "entry" ? 10 : 23;
    let status = "Grün";
    const globalHints = [];

    const fieldStatus = {
      D4: { state: "ok", errors: [] },
      D5: { state: "ok", errors: [] },
      D6: { state: "ok", errors: [] },
      D7: { state: "ok", errors: [] }
    };

    if (!severity) {
      status = "Gelb";
      globalHints.push("IDX-00: Schweregrad/Severity ist nicht gewählt, bitte S1–S4 auswählen.");
    }

    [["D4", d4], ["D5", d5], ["D6", d6], ["D7", d7]].forEach(([name, txt]) => {
      if (!txt || txt.length < minLen) {
        if (status !== "Rot") status = "Gelb";
        const msg = `IDX-LEN-${name}: ${name} Text kürzer als ${minLen} Zeichen, bitte konkretisieren.`;
        fieldStatus[name].errors.push(msg);
        fieldStatus[name].state = "warn";
        globalHints.push(msg);
      }
    });

    const highSeverity = (severity === "S3" || severity === "S4");

    if (level === "automotive") {
      [["D5", d5], ["D6", d6], ["D7", d7]].forEach(([name, txt]) => {
        const low = (txt || "").toLowerCase();
        if (low.includes("schulung") || low.includes("training")) {
          const lenLimit = highSeverity ? 120 : 80;
          if (txt.length < lenLimit) {
            status = "Rot";
            const msg = `IDX-SCH-${name}: ${name} – Schulung alleine ist im Automotive-Kontext${highSeverity ? " und hohem Schweregrad" : ""} als Maßnahme No-Go, bitte technische Maßnahmen und Nachweise ergänzen.`;
            fieldStatus[name].errors.push(msg);
            fieldStatus[name].state = "error";
            globalHints.push(msg);
          }
        }
      });
    }

    if (d4.length >= 10) {
      [["D5", d5], ["D6", d6], ["D7", d7]].forEach(([name, txt]) => {
        if (!txt) return;
        if (!haveCommonKeyword(d4, txt)) {
          let msg;
          if (level === "automotive") {
            if (highSeverity) {
              status = "Rot";
              msg = `IDX-REF-${name}: ${name} Maßnahmen passen nicht erkennbar zur in D4 beschriebenen Ursache, bitte klaren Bezug zur Root Cause herstellen – bei hohem Schweregrad zwingend.`;
              fieldStatus[name].state = "error";
            } else {
              if (status !== "Rot") status = "Gelb";
              msg = `IDX-REF-${name}: ${name} – Maßnahmen passen nicht erkennbar zur in D4 beschriebenen Ursache, bitte klaren Bezug zur Root Cause herstellen.`;
              fieldStatus[name].state = "warn";
            }
          } else if (level === "advanced") {
            if (status !== "Rot") status = "Gelb";
            msg = `IDX-REF-${name}: ${name} – Bitte Bezug zu D4-Ursache deutlicher darstellen.`;
            fieldStatus[name].state = "warn";
          } else {
            msg = `IDX-REF-${name}: ${name} – Prüfe, ob die Maßnahme klar zur D4-Ursache passt.`;
            if (fieldStatus[name].state === "ok") fieldStatus[name].state = "warn";
          }
          fieldStatus[name].errors.push(msg);
          globalHints.push(msg);
        }
      });
    }

    setFieldStatus("d4text", fieldStatus.D4.state, fieldStatus.D4.errors.slice(0, 3).join("\n"));
    setFieldStatus("d5text", fieldStatus.D5.state, fieldStatus.D5.errors.slice(0, 3).join("\n"));
    setFieldStatus("d6text", fieldStatus.D6.state, fieldStatus.D6.errors.slice(0, 3).join("\n"));
    setFieldStatus("d7text", fieldStatus.D7.state, fieldStatus.D7.errors.slice(0, 3).join("\n"));

    renderSummary(status);

    if (globalHints.length) {
      alert("Plausibilitätscheck aktuelles Dokument:\n\n" + globalHints.join("\n"));
    } else {
      alert("Plausibilitätscheck: Keine Beanstandungen gefunden.");
    }
  }

  function insertHintIntoField(selectId, textareaId) {
    const sel = document.getElementById(selectId);
    const ta = document.getElementById(textareaId);
    if (!sel || !ta) return;
    const val = sel.value;
    if (!val) return;
    if (ta.value && !ta.value.endsWith("\n") && !ta.value.endsWith(" ")) {
      ta.value += "\n";
    }
    if (!ta.value) {
      ta.value = val;
    } else {
      ta.value += val;
    }
    sel.selectedIndex = 0;
  }

  function populatePullDownsForFt() {
    const ft = document.getElementById("fertigungstechnik").value || "universal";
    const severity = document.getElementById("severity").value || "S1";
    const level = document.getElementById("level").value || "entry";

    const cfg = getProcessTexts(ft);
    const map = {
      d2: "d2select",
      d3: "d3select",
      d4: "d4select",
      d5: "d5select",
      d6: "d6select",
      d7: "d7select"
    };

    let maxCount = 5;
    if (level === "advanced") maxCount = 8;
    if (level === "automotive") maxCount = 12;
    if (severity === "S3") maxCount = Math.min(maxCount, 15);
    if (severity === "S4") maxCount = Math.min(maxCount + 3, 15);

    Object.keys(map).forEach(dKey => {
      const sel = document.getElementById(map[dKey]);
      if (!sel) return;
      sel.innerHTML = "";
      const placeholder = document.createElement("option");
      const t = i18n[getLang()] || i18n.de;
      if (dKey === "d2") placeholder.textContent = t.uiD2SelectPlaceholder;
      else if (dKey === "d3") placeholder.textContent = t.uiD3SelectPlaceholder;
      else if (dKey === "d4") placeholder.textContent = t.uiD4SelectPlaceholder;
      else if (dKey === "d5") placeholder.textContent = t.uiD5SelectPlaceholder;
      else if (dKey === "d6") placeholder.textContent = t.uiD6SelectPlaceholder;
      else if (dKey === "d7") placeholder.textContent = t.uiD7SelectPlaceholder;
      placeholder.value = "";
      sel.appendChild(placeholder);

      const texts = cfg[dKey] || [];
      texts.slice(0, maxCount).forEach(text => {
        const opt = document.createElement("option");
        opt.value = text;
        opt.textContent = text;
        sel.appendChild(opt);
      });
    });
  }

  function applyCustomerConfig() {
    let cfg = null;
    try {
      const raw = localStorage.getItem("qchecker_customer");
      if (raw) cfg = JSON.parse(raw);
    } catch (e) {}
    const box = document.getElementById("customerLogoBox");
    if (!box) return;
    box.innerHTML = "";
    if (cfg) {
      if (cfg.logo || cfg.name || cfg.web || cfg.email) {
        const wrapper = document.createElement("div");
        if (cfg.logo) {
          const img = document.createElement("img");
          img.src = cfg.logo;
          img.alt = cfg.name || "Customer logo";
          wrapper.appendChild(img);
        }
        if (cfg.name || cfg.web || cfg.email) {
          const info = document.createElement("small");
          const lines = [];
          if (cfg.name) lines.push(cfg.name);
          if (cfg.web) lines.push(`<a href="${cfg.web}" target="_blank" rel="noopener noreferrer">${cfg.web}</a>`);
          if (cfg.email) lines.push(cfg.email);
          info.innerHTML = lines.join("<br>");
          wrapper.appendChild(info);
        }
        box.appendChild(wrapper);
      }
      if (document.getElementById("customerName")) document.getElementById("customerName").value = cfg.name || "";
      if (document.getElementById("customerLogoUrl")) document.getElementById("customerLogoUrl").value = cfg.logo || "";
      if (document.getElementById("customerWebUrl")) document.getElementById("customerWebUrl").value = cfg.web || "";
      if (document.getElementById("customerEmail")) document.getElementById("customerEmail").value = cfg.email || "";
    }
  }

      "severity","language","fertigungstechnik","level",
      "d2text","d3text","d4text","d5text","d6text","d7text"
    ];
    ids.forEach(id => {
      if (data[id] !== undefined && document.getElementById(id)) {
        document.getElementById(id).value = data[id];
      }
    });
    applyLanguage();
    applyCustomerConfig();
    populatePullDownsForFt();
    renderSummary(null);
  }

  function saveDraft() {
    try {
      localStorage.setItem(DRAFTKEY, JSON.stringify(collectFormData()));
      alert("Entwurf gespeichert.");
    } catch (e) {
      alert("Speichern fehlgeschlagen: " + e);
    }
  }

  function loadDraft() {
    try {
      const raw = localStorage.getItem(DRAFTKEY);
      if (!raw) {
        alert("Kein Entwurf vorhanden.");
        return;
      }
      applyFormData(JSON.parse(raw));
      alert("Entwurf geladen.");
    } catch (e) {
      alert("Laden fehlgeschlagen: " + e);
    }
  }

  function exportReport() {
    const data = collectFormData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "8DReport.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function handleImportFile(input) {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        applyFormData(JSON.parse(e.target.result));
        alert("Import erfolgreich.");
      } catch (err) {
        alert("Ungültige JSON-Datei: " + err);
      }
    };
    reader.readAsText(file);
    input.value = "";
  }
